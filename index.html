<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAC Procurement</title>
    <style>
        :root { --bg: #f5f5f3; --surface: #ffffff; --border: #e2e2e0; --text: #1a1a1a; --accent: #1a6b3c; --radius: 10px; }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        
        /* Auth Styles */
        .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 90vh; }
        .auth-box { background: var(--surface); padding: 32px; border-radius: var(--radius); width: 100%; max-width: 400px; border: 1px solid var(--border); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .auth-input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 5px; box-sizing: border-box; }
        .btn-auth { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: 5px; cursor: pointer; }

        /* App Styles */
        #app-wrapper { display: none; max-width: 900px; margin: 0 auto; }
        .topbar { background: var(--surface); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; border-radius: var(--radius); margin-bottom: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(130px, 1fr)); gap: 10px; margin-top: 20px; }
        .card { background: white; padding: 15px; border: 1px solid var(--border); border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
    <div class="auth-box">
        <h2>HAC Procurement</h2>
        <input type="email" id="auth-email" class="auth-input" placeholder="Email">
        <input type="password" id="auth-password" class="auth-input" placeholder="Password">
        <button class="btn-auth" onclick="verifyUser()">Login</button>
    </div>
</div>

<div id="app-wrapper">
    <div class="topbar">
        <strong>HAC Procurement</strong>
        <p>User: <span id="user-display"></span></p>
    </div>
    <div class="container">
        <input type="text" id="project-input" placeholder="Project Name" style="padding:10px; width:100%; margin-bottom:10px;">
        <div class="grid" id="materials-grid"></div>
        <button onclick="submitOrder()" style="margin-top:20px; padding:10px 20px; background:var(--accent); color:white; border:none; cursor:pointer;">Submit Request</button>
    </div>
</div>

<script>
const ALLOWED_USERS = [
    { email: 'abdalla.fawzy@hacksa.net', password: '123456789', name: 'Abdalla Fawzy' },
    { email: 'm.shikhani@hacksa.net', password: '123456789', name: 'M. Shikhani' }
];

function verifyUser() {
    const email = document.getElementById('auth-email').value.trim().toLowerCase();
    const pass = document.getElementById('auth-password').value.trim();
    const user = ALLOWED_USERS.find(u => u.email === email && u.password === pass);
    
    if(user) {
        localStorage.setItem('hac_user', user.name);
        location.reload();
    } else {
        alert('Invalid credentials');
    }
}

window.onload = () => {
    const savedUser = localStorage.getItem('hac_user');
    if(savedUser) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-wrapper').style.display = 'block';
        document.getElementById('user-display').textContent = savedUser;
    }
};

function submitOrder() { alert('Submitted!'); }
</script>
</body>
</html>
