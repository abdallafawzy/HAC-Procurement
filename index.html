<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HAC Procurement</title>
    <style>
        /* (احتفظ بنفس التنسيقات التي أرسلتها فهي جيدة، فقط تأكد من عدم تكرار تعريف الـ :root) */
    </style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
    <div class="auth-box">
        <h2>HAC Procurement</h2>
        <p>Please enter your authorized credentials.</p>
        <input type="email" id="auth-email" class="auth-input" placeholder="name@company.com">
        <input type="password" id="auth-password" class="auth-input" placeholder="Enter Password">
        <button class="btn-auth" id="auth-btn" onclick="verifyUser()">Login</button>
    </div>
</div>

<div id="app-wrapper" style="display: none;">
    <div class="topbar">
        <div class="topbar-logo">HAC Procurement</div>
        <div class="topbar-meta">
            <span class="pr-badge" id="pr-display">PR-2026-—</span>
            <div class="meta-item">User: <strong id="user-display">—</strong></div>
        </div>
    </div>
    
    <div class="container" id="main-container">
        <div id="main-form">
            <div class="project-fields-row">
                <div class="project-wrap">
                    <label>Project</label>
                    <input type="text" id="project-input" placeholder="Project Name">
                </div>
                <div class="project-wrap">
                    <label>Location</label>
                    <select id="location-input">
                        <option value="Riyadh">Riyadh</option>
                        <option value="Jeddah">Jeddah</option>
                    </select>
                </div>
            </div>
            
            <div class="filter-section">
                <div class="filter-label">Category</div>
                <div class="filter-tabs" id="filter-tabs"></div>
            </div>

            <div class="grid" id="materials-grid">
                <div class="loading">Loading materials...</div>
            </div>

            <div class="summary" id="summary">
                <span id="summary-text"></span>
            </div>

            <div class="actions">
                <button class="btn-clear" onclick="clearAll()">Clear</button>
                <button class="btn-submit" id="submit-btn" onclick="submitOrder()">Submit Request</button>
            </div>
        </div>
        
        <div class="success-screen" id="success-screen">
            <h3>Request Submitted!</h3>
            <button class="btn-new" onclick="location.reload()">New Request</button>
        </div>
    </div>
</div>

<script>
    const API_URL = 'https://script.google.com/macros/s/AKfycbyCNCmHawUWwIfwiSxEQiZEzUebzKh4hvhy0URoPxOlhfw2F4CjwCX9dB9FLXaNzR4e4Q/exec';
    const ALLOWED_USERS = [
        { email: 'abdalla.fawzy@hacksa.net', password: '123456789', name: 'Abdalla Fawzy' },
        { email: 'm.shikhani@hacksa.net', password: '123456789', name: 'M. Shikhani' }
    ];

    let materials = [];
    let currentCat = 'ALL';

    // التحقق عند التحميل
    window.onload = () => {
        const savedUser = localStorage.getItem('hac_user');
        if (savedUser) {
            showApp(savedUser);
        }
    };

    function showApp(name) {
        document.getElementById('auth-screen').style.display = 'none';
        document.getElementById('app-wrapper').style.display = 'block';
        document.getElementById('user-display').textContent = name;
        document.getElementById('project-input').value = localStorage.getItem('hac_project') || '';
        document.getElementById('location-input').value = localStorage.getItem('hac_location') || 'Riyadh';
        loadMaterials();
    }

    function verifyUser() {
        const email = document.getElementById('auth-email').value.trim().toLowerCase();
        const pass = document.getElementById('auth-password').value.trim();
        const user = ALLOWED_USERS.find(u => u.email === email && u.password === pass);
        if (user) {
            localStorage.setItem('hac_user', user.name);
            showApp(user.name);
        } else {
            alert('Access Denied');
        }
    }

    function loadMaterials() {
        fetch(API_URL + '?action=getMaterials')
            .then(r => r.json())
            .then(res => {
                materials = res.data.map(m => ({
                    ...m,
                    quantity: localStorage.getItem('qty_' + m.code) || '',
                    selected: !!localStorage.getItem('qty_' + m.code)
                }));
                renderTabs();
                renderGrid('ALL');
            });
    }

    function renderTabs() {
        const cats = ['ALL', ...new Set(materials.map(m => m.category))];
        document.getElementById('filter-tabs').innerHTML = cats.map(c => 
            `<div class="filter-tab ${c==='ALL'?'active':''}" onclick="filterCat('${c}')">${c}</div>`).join('');
    }

    function filterCat(cat) {
        currentCat = cat;
        renderGrid(cat);
    }

    function renderGrid(cat) {
        const grid = document.getElementById('materials-grid');
        const filtered = cat === 'ALL' ? materials : materials.filter(m => m.category === cat);
        grid.innerHTML = filtered.map(m => `
            <div class="card ${m.selected ? 'selected' : ''}" onclick="toggleCard('${m.code}')">
                <div class="card-name">${m.name}</div>
                <div class="card-code">${m.code}</div>
                <div class="qty-row" onclick="event.stopPropagation()">
                    <input type="number" placeholder="Qty" value="${m.quantity}" oninput="updateQty('${m.code}', this.value)">
                </div>
            </div>
        `).join('');
    }

    function toggleCard(code) {
        const m = materials.find(x => x.code === code);
        m.selected = !m.selected;
        renderGrid(currentCat);
    }

    function updateQty(code, val) {
        localStorage.setItem('qty_' + code, val);
        materials.find(m => m.code === code).quantity = val;
    }

    function clearAll() {
        localStorage.clear();
        location.reload();
    }

    function submitOrder() {
        // أضف هنا منطق الـ submitOrder الخاص بك
        alert('Order logic submitted!');
    }
</script>
</body>
</html>
