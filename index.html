<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HAC Procurement</title>
<style>
  :root { --bg: #f5f5f3; --surface: #ffffff; --border: #e2e2e0; --text: #1a1a1a; --accent: #1a6b3c; --accent-light: #e8f5ee; --accent-border: #a3d4b5; --radius: 10px; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); margin: 0; }
  .auth-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .auth-box { background: white; padding: 32px; border-radius: var(--radius); border: 1px solid var(--border); width: 350px; text-align: center; }
  .auth-input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 16px; }
  .btn-auth { width: 100%; padding: 12px; background: var(--accent); color: white; border: none; border-radius: var(--radius); cursor: pointer; }
  #app-wrapper { display: none; }
  .topbar { background: white; border-bottom: 1px solid var(--border); padding: 15px 25px; display: flex; justify-content: space-between; align-items: center; }
  .container { max-width: 900px; margin: 20px auto; padding: 20px; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 12px; }
  .card { background: white; border: 1px solid var(--border); border-radius: 10px; padding: 12px; cursor: pointer; transition: 0.2s; }
  .card.selected { border: 2px solid var(--accent); background: var(--accent-light); }
  .qty-input { width: 100%; margin-top: 10px; padding: 8px; border: 1px solid var(--accent-border); border-radius: 6px; text-align: center; }
  .filter-tabs { display: flex; gap: 8px; margin-bottom: 20px; }
  .filter-tab { padding: 6px 15px; border-radius: 20px; border: 1px solid var(--border); cursor: pointer; font-size: 13px; }
  .filter-tab.active { background: var(--accent); color: white; border: none; }
</style>
</head>
<body>

<div class="auth-screen" id="auth-screen">
  <div class="auth-box">
    <h2>HAC Login</h2>
    <input type="email" id="auth-email" class="auth-input" placeholder="Email">
    <input type="password" id="auth-password" class="auth-input" placeholder="Password">
    <button class="btn-auth" onclick="verifyUser()">Login</button>
  </div>
</div>

<div id="app-wrapper">
  <div class="topbar">
    <div><b>HAC Procurement</b> | <span id="user-name"></span></div>
    <button onclick="logout()" style="background:none; border:none; color:red; cursor:pointer;">Logout</button>
  </div>
  <div class="container">
    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px; margin-bottom:20px;">
      <input type="text" id="project-input" class="auth-input" placeholder="Project Name" oninput="saveFields()">
      <select id="location-input" class="auth-input" onchange="saveFields()">
        <option value="Riyadh">Riyadh</option><option value="Jeddah">Jeddah</option>
      </select>
    </div>
    <div class="filter-tabs" id="filter-tabs"></div>
    <div class="grid" id="materials-grid"></div>
    <button class="btn-auth" id="submit-btn" style="margin-top:20px;" onclick="submitOrder()">Submit Request</button>
  </div>
</div>

<script>
const API_URL = 'https://script.google.com/macros/s/AKfycbyCNCmHawUWwIfwiSxEQiZEzUebzKh4hvhy0URoPxOlhfw2F4CjwCX9dB9FLXaNzR4e4Q/exec';
const ALLOWED_USERS = [
  { email: 'abdalla.fawzy@hacksa.net', password: '123456789', name: 'Abdalla Fawzy' },
  { email: 'm.shikhani@hacksa.net', password: '123456789', name: 'M. Shikhani' }
];

let materials = [];

window.onload = () => {
  const user = localStorage.getItem('hac_user');
  if (user) showApp(user);
};

function showApp(name) {
  document.getElementById('auth-screen').style.display = 'none';
  document.getElementById('app-wrapper').style.display = 'block';
  document.getElementById('user-name').textContent = name;
  document.getElementById('project-input').value = localStorage.getItem('hac_proj') || '';
  document.getElementById('location-input').value = localStorage.getItem('hac_loc') || 'Riyadh';
  loadMaterials();
}

function verifyUser() {
  const email = document.getElementById('auth-email').value.toLowerCase();
  const pass = document.getElementById('auth-password').value;
  const user = ALLOWED_USERS.find(u => u.email === email && u.password === pass);
  if(user) {
    localStorage.setItem('hac_user', user.name);
    showApp(user.name);
  } else alert('Wrong credentials!');
}

function loadMaterials() {
  fetch(API_URL + '?action=getMaterials').then(r => r.json()).then(res => {
    materials = res.data.map(m => ({
      ...m,
      qty: localStorage.getItem('qty_'+m.code) || '',
      selected: !!localStorage.getItem('qty_'+m.code)
    }));
    render('ALL');
  });
}

function render(cat) {
  const filtered = cat === 'ALL' ? materials : materials.filter(m => m.category === cat);
  document.getElementById('materials-grid').innerHTML = filtered.map(m => `
    <div class="card ${m.selected ? 'selected' : ''}" onclick="toggle('${m.code}')">
      <div style="font-weight:bold">${m.description}</div>
      <div style="font-size:10px; color:#666">${m.code}</div>
      ${m.selected ? `<input type="number" class="qty-input" value="${m.qty}" onclick="event.stopPropagation()" oninput="saveQty('${m.code}', this.value)" placeholder="Qty">` : ''}
    </div>
  `).join('');
}

function toggle(code) {
  const m = materials.find(x => x.code === code);
  m.selected = !m.selected;
  if(!m.selected) { m.qty = ''; localStorage.removeItem('qty_'+code); }
  render('ALL');
}

function saveQty(code, val) {
  localStorage.setItem('qty_'+code, val);
  materials.find(x => x.code === code).qty = val;
}

function saveFields() {
  localStorage.setItem('hac_proj', document.getElementById('project-input').value);
  localStorage.setItem('hac_loc', document.getElementById('location-input').value);
}

function logout() {
  localStorage.clear();
  location.reload();
}

function submitOrder() {
  const selected = materials.filter(m => m.selected && m.qty > 0);
  if(!selected.length) return alert('Select items!');
  const params = new URLSearchParams({
    action: 'submitOrder',
    project: document.getElementById('project-input').value,
    location: document.getElementById('location-input').value,
    requester: localStorage.getItem('hac_user'),
    orders: JSON.stringify(selected.map(m => ({code: m.code, description: m.description, qty: m.qty})))
  });
  fetch(API_URL + '?' + params).then(() => {
    alert('Submitted!');
    localStorage.clear();
    location.reload();
  });
}
</script>
</body>
</html>
